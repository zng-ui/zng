[package]
name = "zng-wgt-material-icons"
version = "0.15.0"
authors = ["The Zng Project Developers"]
edition = "2024"
license = "Apache-2.0 OR MIT"
readme = "README.md"
description = "Part of the zng project."
documentation = "https://zng-ui.github.io/doc/zng_wgt_material_icons"
repository = "https://github.com/zng-ui/zng"
categories = ["gui"]
keywords = ["gui", "ui", "user-interface", "zng"]

[features]
# Embedded font files.
embedded = []

# Outlined icon set.
outlined = []

# Filled icon set.
filled = []

# Rounded icon set.
rounded = []

# Sharp icon set.
sharp = []

# Compile with usage profile recorder.
# 
# After recording build with `"embedded_subset"` to embed only the icons used.
# 
# Saves to `ZNG_MATERIAL_ICONS_PROFILE_FILE` if set to a .rec.subset path
# Or `"res/optimization-profiles/zng-wgt-material-icons.rec.subset"` by default
usage_recorder = []
# Use recorded usage profile to subset icon fonts on build for embedding.
# 
# See `"usage_recorder"` for how to set the file.
embedded_subset = ["embedded", "dep:font-subset"]

# Internal feature, only enabled if built with --all-features
_all_features = []

[dependencies]
zng-app = { path = "../zng-app", version = "0.25.0", default-features = false }
zng-wgt = { path = "../zng-wgt", version = "0.17.0", default-features = false }
zng-var = { path = "../zng-var", version = "0.15.0", default-features = false }
zng-ext-font = { path = "../zng-ext-font", version = "0.16.0", default-features = false }
zng-wgt-text = { path = "../zng-wgt-text", version = "0.16.0", default-features = false }
zng-env = { path = "../zng-env", version = "0.12.0", default-features = false }

phf = { version = "0.14", default-features = false }
tracing = { version = "0.1", default-features = false }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"

[build-dependencies]
dunce = { version = "1.0", default-features = false }
phf_codegen = { version = "0.14", default-features = false }
font-subset = { version = "0.1.0", default-features = false, features = ["std"], optional = true }

[package.metadata.docs.rs]
all-features = true

[package.metadata.zng-do]
# this file is generated on build, docs.rs does not give write access to target/doc.
rustdoc-args = [
    "--html-in-header",
    "target/doc/zng-material-icons-extensions.html",
]
